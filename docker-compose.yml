services:
  mongo:
    image: mongo:7
    container_name: siem-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: siem-backend
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: siem_mvp
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      MODEL_PATH: models/isolation_forest.pkl
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-20}
      MOCK_WEBHOOK_URL: ${MOCK_WEBHOOK_URL:-}
    depends_on:
      - mongo
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: siem-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

  simulator:
    build:
      context: ./simulator
    container_name: siem-simulator
    profiles:
      - demo
    depends_on:
      - backend
    command: ["python", "log_simulator.py", "--api-url", "http://backend:8000/ingest"]

volumes:
  mongo-data:
